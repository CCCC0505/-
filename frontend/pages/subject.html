<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学科资料 - AI学习伙伴</title>
    <link rel="stylesheet" href="../css/shouye.css?v=20260322-homefix-1">
    <link rel="stylesheet" href="../css/subject.css?v=20260322-homefix-1">
    <!-- 添加谷歌字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- 添加动画库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --primary-color: #7C4DFF;
            --secondary-color: #3D5AFE;
            --primary-rgb: 124, 77, 255;
            --secondary-rgb: 61, 90, 254;
            --text-color: #333333;
            --text-light: #666666;
            --card-bg: #ffffff;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 5px 15px rgba(0, 0, 0, 0.05);
            --border-radius: 12px;
        }
        /* 直接使用普通颜色 */
        .title-text {
            font-size: 2.2rem;
            font-weight: 700;
            color: #7C4DFF !important;
            background: none !important;
            -webkit-text-fill-color: #7C4DFF !important;
            
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
        }
        
        /* 确保LOGO样式一致 */
        .logo-icon {
            background-color: var(--primary-color);
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-right: 12px;
            position: relative;
            overflow: hidden;
        }
        
        .circle {
            background: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            position: relative;
            z-index: 2;
        }
        
        /* 隐藏SVG图标 */
        .logo-svg {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 背景装饰元素 -->
    <div class="bg-elements">
        <div class="bg-circle bg-circle-1"></div>
        <div class="bg-circle bg-circle-2"></div>
        <div class="bg-circle bg-circle-3"></div>
        <div class="bg-dot-grid"></div>
        <div class="bg-pattern"></div>
    </div>

    <div class="container">
        <!-- 左侧导航栏 -->
        <div class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <div class="circle"></div>
                </div>
                <div class="logo-text">
                    <h3>AI学习伙伴</h3>
                    <p>个性化学习助手</p>
                </div>
            </div>

            <nav class="nav-menu">
                <a href="../index.html" class="nav-item">
                    <span class="nav-icon home-icon"></span>
                    <span>首页</span>
                </a>
                <a href="subject.html" class="nav-item active">
                    <span class="nav-icon course-icon"></span>
                    <span>学科资料</span>
                </a>
                <a href="practice.html" class="nav-item">
                    <span class="nav-icon practice-icon"></span>
                    <span>练习中心</span>
                </a>
                <a href="analysis.html" class="nav-item">
                    <span class="nav-icon analysis-icon"></span>
                    <span>学习分析</span>
                </a>
                <a href="notebook.html" class="nav-item">
                    <span class="nav-icon notebook-icon"></span>
                    <span>错题本</span>
                </a>
                <a href="personal.html" class="nav-item">
                    <span class="nav-icon user-icon"></span>
                    <span>个人中心</span>
                </a>
            </nav>

            <div class="avatar-container" id="ai-avatar-container">
                <div class="avatar">
                    <!-- 头像 -->
                    <img src="../images/生成卡通形象.png" alt="AI助手头像">
                </div>
                <div class="chat-bubble">
                    <p>你好！我是你的AI助手</p>
                    <p>点击开始学习，我将陪你一起</p>
                </div>
            </div>
            
            <!-- AI助手对话界面 -->
            <div class="ai-sidebar-chat" id="ai-sidebar-chat">
                <div class="ai-chat-header">
                    <h3>AI学习助手</h3>
                </div>
                <div class="ai-chat-messages" id="ai-sidebar-messages">
                    <!-- 消息将在这里动态加载 -->
                </div>
                <div class="ai-chat-input">
                    <input type="text" id="ai-sidebar-input" placeholder="有什么想问我的...">
                    <button id="ai-sidebar-send">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <div class="subject-page-container">
                <!-- 学科选择标题区 -->
                <div class="subject-page-header">
                    <h1 class="title-text">学科资料中心</h1>
                    <p class="subject-page-intro">选择你需要学习的科目，探索个性化的学习内容和资源，开启智能学习之旅</p>
                </div>

                <!-- 学科级别选择标签页 -->
                <div class="subject-tabs animate__animated animate__fadeIn animate__delay-1s">
                    <button class="tab-btn active">全部</button>
                    <button class="tab-btn">小学</button>
                    <button class="tab-btn">初中</button>
                    <button class="tab-btn">高中</button>
                    <button class="tab-btn">大学</button>
                    <div class="tab-indicator"></div>
                </div>

                <!-- 主要内容区 -->
                <div class="subject-content animate__animated animate__fadeIn animate__delay-2s">
                    <!-- 左侧年级导航 -->
                    <div class="grade-nav">
                        <!-- 小学导航 -->
                        <div class="grade-category">
                            <div class="grade-header">
                                <span class="school-icon"></span>
                                <span>小学</span>
                            </div>
                            <div class="grade-list">
                                <a href="#" class="grade-item active">
                                    <span class="grade-icon"></span>
                                    <span>一年级</span>
                                </a>
                                <a href="#" class="grade-item">
                                    <span class="grade-icon"></span>
                                    <span>二年级</span>
                                </a>
                                <a href="#" class="grade-item">
                                    <span class="grade-icon"></span>
                                    <span>三年级</span>
                                </a>
                                <a href="#" class="grade-item">
                                    <span class="grade-icon"></span>
                                    <span>四年级</span>
                                </a>
                                <a href="#" class="grade-item">
                                    <span class="grade-icon"></span>
                                    <span>五年级</span>
                                </a>
                                <a href="#" class="grade-item">
                                    <span class="grade-icon"></span>
                                    <span>六年级</span>
                                </a>
                            </div>
                        </div>
                        
                        <!-- 初中导航 -->
                        <div class="grade-category">
                            <div class="grade-header">
                                <span class="school-icon"></span>
                                <span>初中</span>
                            </div>
                            <div class="grade-list">
                                <a href="#" class="grade-item">
                                    <span class="grade-icon"></span>
                                    <span>初一</span>
                                </a>
                                <a href="#" class="grade-item">
                                    <span class="grade-icon"></span>
                                    <span>初二</span>
                                </a>
                                <a href="#" class="grade-item">
                                    <span class="grade-icon"></span>
                                    <span>初三</span>
                                </a>
                            </div>
                        </div>
                        
                        <!-- 高中导航 -->
                        <div class="grade-category">
                            <div class="grade-header">
                                <span class="school-icon"></span>
                                <span>高中</span>
                            </div>
                            <div class="grade-list">
                                <a href="#" class="grade-item">
                                    <span class="grade-icon"></span>
                                    <span>高一</span>
                                </a>
                                <a href="#" class="grade-item">
                                    <span class="grade-icon"></span>
                                    <span>高二</span>
                                </a>
                                <a href="#" class="grade-item">
                                    <span class="grade-icon"></span>
                                    <span>高三</span>
                                </a>
                            </div>
                        </div>
                    </div>

                    <!-- 右侧学科列表 -->
                    <div class="subject-list-container">
                        <h2 class="subject-list-title">小学一年级 - 学科列表</h2>
                        
                        <div class="subject-filter">
                            <input type="text" placeholder="搜索学科..." class="subject-search">
                            <div class="subject-sort">
                                <button class="sort-btn active">默认排序</button>
                                <button class="sort-btn">按名称</button>
                                <button class="sort-btn">按热度</button>
                            </div>
                        </div>
                        
                        <div class="subject-list">
                            <!-- 学科列表将由JavaScript动态加载 -->
                            <div class="loading-spinner"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/shouye.js?v=20260322-homefix-1"></script>
    <script src="../js/subject.js?v=20260322-homefix-1"></script>
    <!-- 修复脚本 -->
    <script src="../js/subject-fix.js?v=20260322-homefix-1"></script>
    <script src="../js/ai-service.js?v=20260322-homefix-1"></script>
    <!-- AI助手修复脚本 -->
    <script src="../js/ai-service-fix.js?v=20260322-homefix-1"></script>
</body>
</html>
